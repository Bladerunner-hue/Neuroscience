name: Deploy Marimo WASM Dashboards to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'marimo_notebooks/**'
      - 'marimo_exports/export_wasm.py'
      - '.github/workflows/deploy-pages.yml'
      - 'docs/**'
  workflow_dispatch:

# Required for GitHub Pages deployment with OIDC
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install marimo
        run: |
          python -m pip install --upgrade pip
          pip install "marimo[recommended]"

      - name: Export notebooks to WASM (free tier)
        run: |
          python marimo_exports/export_wasm.py || true

      - name: Prepare docs/ for GitHub Pages
        run: |
          mkdir -p docs/wasm
          # Copy all available WASM exports
          cp -r marimo_exports/wasm/* docs/wasm/ 2>/dev/null || true

          # Ensure our custom landing page exists
          if [ -f "docs/index.html" ]; then
            cp docs/index.html docs/index.html
          fi

          touch docs/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
          # Explicit name to match deploy step
          name: github-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # Note on Node 20 deprecation:
        # If you see warnings about Node 20, you can temporarily add this to the job:
        # env:
        #   ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        uses: actions/deploy-pages@v4