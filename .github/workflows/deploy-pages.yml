name: Deploy Marimo WASM Dashboards to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'marimo_notebooks/**'
      - 'marimo_exports/export_wasm.py'
      - '.github/workflows/deploy-pages.yml'
      - 'docs/**'
  workflow_dispatch:

# Required for GitHub Pages deployment with OIDC
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install marimo
        run: |
          python -m pip install --upgrade pip
          pip install "marimo[recommended]"

      - name: Export notebooks to WASM (free tier)
        run: |
          echo "Running WASM export..."
          python marimo_exports/export_wasm.py || true
          echo "WASM export step completed. Checking output..."
          ls -la marimo_exports/wasm/ 2>/dev/null || echo "No wasm directory yet (this is ok if export had issues for some notebooks)"

      - name: Prepare docs/ for GitHub Pages
        run: |
          echo "=== Preparing docs/ for GitHub Pages ==="
          mkdir -p docs/wasm

          # Copy freshly generated WASM exports from the export step
          if [ -d "marimo_exports/wasm" ] && [ "$(ls -A marimo_exports/wasm 2>/dev/null)" ]; then
            echo "Copying WASM builds..."
            cp -r marimo_exports/wasm/* docs/wasm/ 2>/dev/null || true
          else
            echo "No WASM builds found in marimo_exports/wasm (or directory empty)"
          fi

          # Ensure landing page exists (it is committed in docs/index.html)
          if [ ! -f "docs/index.html" ]; then
            echo "Warning: docs/index.html is missing - creating minimal placeholder"
            echo '<!doctype html><html><body><h1>Neuroscience Dashboards</h1><p>See repo for details.</p></body></html>' > docs/index.html
          fi

          touch docs/.nojekyll

          echo "=== Docs content prepared ==="
          echo "docs/ contents:"
          ls -la docs/ || true
          echo "wasm/ contents:"
          ls -la docs/wasm/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
          name: github-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Temporary for Node 20 deprecation warning (as per GitHub blog)
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
